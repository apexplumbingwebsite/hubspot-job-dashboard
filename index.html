<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Plumbing Portal</title>
    <!-- React and Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HubSpot Forms Script (Required for the embed to work) -->
    <script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/embed/v2.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // We use a "view" state to switch between the Client Form and the Admin Dashboard
            const [view, setView] = useState('client'); 
            const [jobs, setJobs] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filter, setFilter] = useState('All');

            useEffect(() => {
                // Check URL for ?admin=true to automatically show the dashboard
                const params = new URLSearchParams(window.location.search);
                if (params.get('admin') === 'true') {
                    setView('admin');
                }
            }, []);

            useEffect(() => {
                // THIS IS WHERE THE HUBSPOT MAGIC HAPPENS
                if (view === 'client' && window.hbspt) {
                    window.hbspt.forms.create({
                        region: "na1",
                        portalId: "148112678", // Replace with your Portal ID
                        formId: "fb29941f-c872-404f-a741-f2af1c156385",     // Replace with your Form ID
                        target: "#hubspot-form-container"
                    });
                }
            }, [view]);

            // --- UI COMPONENTS ---

            const ClientView = () => (
                <div className="max-w-2xl mx-auto px-4 py-16">
                    <div className="text-center mb-12">
                        <h1 className="text-4xl font-bold tracking-tight mb-4">Request a Service</h1>
                        <p className="text-slate-500 text-lg">Fast, reliable plumbing solutions by Apex Plumbing.</p>
                    </div>
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                        {/* THE FORM INJECTS HERE */}
                        <div id="hubspot-form-container"></div>
                    </div>
                    <div className="mt-8 text-center">
                        <button onClick={() => setView('admin')} className="text-slate-400 text-xs hover:underline">
                            Admin Login
                        </button>
                    </div>
                </div>
            );

            const AdminDashboard = () => (
                <div className="min-h-screen flex flex-col font-sans text-slate-900 animate-in fade-in duration-500">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-orange-500 p-2 rounded-lg text-white">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">Apex Admin Dashboard</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <input 
                                type="text" 
                                placeholder="Search leads..." 
                                className="pl-4 pr-4 py-2 bg-slate-100 rounded-full text-sm outline-none w-64 focus:ring-2 focus:ring-orange-500"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <button onClick={() => setView('client')} className="text-sm text-slate-500 font-medium">Logout</button>
                        </div>
                    </header>

                    <main className="flex-1 flex overflow-hidden" style={{height: 'calc(100vh - 73px)'}}>
                        <div className="w-1/3 border-r border-slate-200 bg-white flex flex-col overflow-hidden">
                            <div className="p-4 border-b border-slate-100 flex gap-2 overflow-x-auto no-scrollbar">
                                {['All', 'Requested', 'Scheduled'].map(s => (
                                    <button key={s} onClick={() => setFilter(s)} className={`px-3 py-1.5 rounded-md text-xs font-medium whitespace-nowrap ${filter === s ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}`}>{s}</button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 text-center text-slate-400 text-sm mt-10">
                                Leads from HubSpot will appear here.
                            </div>
                        </div>
                        <div className="flex-1 bg-slate-50 flex items-center justify-center text-slate-300">
                            <p>Select a request to manage booking</p>
                        </div>
                    </main>
                </div>
            );

            return view === 'client' ? <ClientView /> : <AdminDashboard />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
