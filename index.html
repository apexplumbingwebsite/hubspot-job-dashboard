<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Booking Dashboard</title>
    <!-- React and Babel CDN for browser-side compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbars for the filter bar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Deconstruct hooks from React for global use
        const { useState, useEffect } = React;

        const App = () => {
            const [jobs, setJobs] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [loading, setLoading] = useState(false);
            const [filter, setFilter] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [bookingDetails, setBookingDetails] = useState({ date: '', time: '' });
            const [statusMsg, setStatusMsg] = useState({ type: '', text: '' });

            // Icons from Lucide (using SVG fallback for browser stability)
            const Icon = ({ name, size = 18, className = "" }) => {
                return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
            };

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [selectedJob, jobs, loading]);

            const handleBookJob = () => {
                if (!bookingDetails.date || !bookingDetails.time) {
                    setStatusMsg({ type: 'error', text: 'Please select both a date and a time.' });
                    return;
                }
                setLoading(true);
                // Simulate HubSpot API call
                setTimeout(() => {
                    setStatusMsg({ type: 'success', text: `Job confirmed and synced to Google Calendar!` });
                    setSelectedJob(null);
                    setBookingDetails({ date: '', time: '' });
                    setLoading(false);
                    setTimeout(() => setStatusMsg({ type: '', text: '' }), 5000);
                }, 1000);
            };

            const filteredJobs = jobs.filter(job => 
                (filter === 'All' || job.stage === filter) &&
                (job.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                 job.client.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            return (
                <div className="min-h-screen flex flex-col font-sans text-slate-900">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-orange-500 p-2 rounded-lg text-white">
                                <Icon name="briefcase" size={24} />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">Job Booking Dashboard</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="Search jobs..." 
                                    className="pl-10 pr-4 py-2 bg-slate-100 border-transparent rounded-full text-sm focus:bg-white focus:ring-2 focus:ring-orange-500 transition-all outline-none w-64"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 flex overflow-hidden" style={{height: 'calc(100vh - 73px)'}}>
                        <div className="w-1/3 border-r border-slate-200 bg-white flex flex-col overflow-hidden">
                            <div className="p-4 border-b border-slate-100 flex gap-2 overflow-x-auto no-scrollbar">
                                {['All', 'Requested', 'Reviewing', 'Scheduled'].map(s => (
                                    <button 
                                        key={s}
                                        onClick={() => setFilter(s)}
                                        className={`px-3 py-1.5 rounded-md text-xs font-medium whitespace-nowrap transition-colors ${filter === s ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {s}
                                    </button>
                                ))}
                            </div>

                            <div className="flex-1 overflow-y-auto">
                                {filteredJobs.length === 0 ? (
                                    <div className="p-10 text-center flex flex-col items-center gap-3">
                                        <div className="bg-slate-50 p-4 rounded-full text-slate-300">
                                            <Icon name="search" size={32} />
                                        </div>
                                        <p className="text-slate-400 text-sm">No job requests found.</p>
                                        <p className="text-slate-400 text-xs">New submissions will appear here once connected to HubSpot.</p>
                                    </div>
                                ) : (
                                    filteredJobs.map(job => (
                                        <div key={job.id} onClick={() => setSelectedJob(job)} className={`p-4 border-b border-slate-50 cursor-pointer transition-all hover:bg-orange-50 ${selectedJob?.id === job.id ? 'bg-orange-50 border-l-4 border-l-orange-500' : ''}`}>
                                            <div className="flex justify-between items-start mb-1">
                                                <h3 className="font-bold text-slate-800">{job.name}</h3>
                                            </div>
                                            <div className="text-sm text-slate-500">{job.client}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-8 bg-slate-50">
                            {statusMsg.text && (
                                <div className={`mb-6 p-4 rounded-xl flex items-center gap-3 ${statusMsg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-red-50 text-red-700 border border-red-100'}`}>
                                    <Icon name={statusMsg.type === 'success' ? "check-circle" : "alert-circle"} size={20} />
                                    <span className="font-medium text-sm">{statusMsg.text}</span>
                                </div>
                            )}

                            {selectedJob ? (
                                <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-6 border-b border-slate-100">
                                        <h2 className="text-2xl font-bold">{selectedJob.name}</h2>
                                        <p className="text-slate-500 text-sm">Reviewing request from {selectedJob.client}</p>
                                    </div>
                                    <div className="p-6 space-y-6">
                                        <div className="bg-slate-50 p-6 rounded-xl border border-slate-200">
                                            <h4 className="text-sm font-bold mb-4 flex items-center gap-2 text-orange-600">
                                                <Icon name="calendar" size={18} /> Schedule Job
                                            </h4>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Date</label>
                                                    <input type="date" className="w-full px-4 py-2 rounded-lg border border-slate-200 outline-none" value={bookingDetails.date} onChange={(e) => setBookingDetails({...bookingDetails, date: e.target.value})} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Time</label>
                                                    <input type="time" className="w-full px-4 py-2 rounded-lg border border-slate-200 outline-none" value={bookingDetails.time} onChange={(e) => setBookingDetails({...bookingDetails, time: e.target.value})} />
                                                </div>
                                            </div>
                                            <button onClick={handleBookJob} disabled={loading} className="w-full mt-6 bg-slate-900 hover:bg-black text-white py-3 rounded-xl font-bold transition-all disabled:opacity-50">
                                                {loading ? 'Processing...' : 'Confirm Booking'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-slate-300 gap-4">
                                    <Icon name="briefcase" size={64} />
                                    <p className="text-lg font-medium text-slate-400">Select a request to start booking</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
