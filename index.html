<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-transparent">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-800 p-4 text-white flex items-center gap-2">
            <i data-lucide="calendar-check" class="w-5 h-5 text-blue-400"></i>
            <h3 class="font-bold text-lg">Recently Booked Jobs</h3>
        </div>
        
        <div id="loading-state" class="p-8 text-center text-slate-500 flex flex-col items-center justify-center">
            <i data-lucide="loader-2" class="w-6 h-6 animate-spin mb-2 text-blue-600"></i>
            <p class="text-sm">Syncing live schedule...</p>
        </div>

        <div id="jobs-container" class="divide-y divide-slate-100 hidden max-h-96 overflow-y-auto">
            <!-- Jobs will be injected here by JavaScript -->
        </div>
        
        <div id="empty-state" class="hidden p-8 text-center text-slate-500">
            <p class="text-sm">No recent bookings to display.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. FIREBASE CONFIGURATION
        // MUST MATCH the config used in your Client Form and Netlify Dashboard
     const firebaseConfig = {
  apiKey: "AIzaSyDFHXBZPJGcGUQTMimjAIHzztQ2gf94BbM",
  authDomain: "apexplumbingsystem.firebaseapp.com",
  projectId: "apexplumbingsystem",
  storageBucket: "apexplumbingsystem.firebasestorage.app",
  messagingSenderId: "312950475322",
  appId: "1:312950475322:web:c03298f8d0e9bf350e0303",
  measurementId: "G-NKVBKNR4NR"
};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'apex-plumbing-app';
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 2. AUTHENTICATE & FETCH DATA
        async function initLiveSchedule() {
            try {
                // Required authentication before reading data
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }

                // Listen for auth state changes to ensure user is logged in before querying
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        const container = document.getElementById('jobs-container');
                        const loading = document.getElementById('loading-state');
                        const empty = document.getElementById('empty-state');

                        // Listen to the exact same database your form and dashboard use
                        db.collection(`artifacts/${appId}/public/data/submissions`).onSnapshot((snapshot) => {
                            const allLeads = snapshot.docs.map(doc => doc.data());
                            
                            // Filter for jobs that have been scheduled in the dashboard
                            const scheduledJobs = allLeads.filter(lead => 
                                (lead.status === 'scheduled' || lead.status === 'accepted') && 
                                lead.scheduledDate
                            );

                            // Sort by scheduled date (newest first)
                            scheduledJobs.sort((a, b) => new Date(b.scheduledDate) - new Date(a.scheduledDate));

                            loading.classList.add('hidden');

                            if (scheduledJobs.length === 0) {
                                container.classList.add('hidden');
                                empty.classList.remove('hidden');
                                return;
                            }

                            empty.classList.add('hidden');
                            container.classList.remove('hidden');
                            container.innerHTML = '';

                            // Display the up to 5 most recent booked jobs
                            scheduledJobs.slice(0, 5).forEach(job => {
                                // Format the date nicely
                                const dateObj = new Date(job.scheduledDate);
                                const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                
                                // Mask the client's last name for privacy on a public website
                                const firstName = job.name.split(' ')[0];
                                const lastInitial = job.name.split(' ').length > 1 ? job.name.split(' ')[1].charAt(0) + '.' : '';
                                const publicName = `${firstName} ${lastInitial}`;

                                const jobHtml = `
                                    <div class="p-4 hover:bg-slate-50 transition-colors">
                                        <div class="flex justify-between items-start mb-1">
                                            <h4 class="font-bold text-slate-800 text-sm">${publicName}</h4>
                                            <span class="text-xs font-semibold px-2 py-1 bg-green-100 text-green-700 rounded-md">
                                                ${formattedDate}
                                            </span>
                                        </div>
                                        <p class="text-sm text-blue-600 font-medium">${job.serviceType}</p>
                                    </div>
                                `;
                                container.innerHTML += jobHtml;
                            });
                        }, (error) => {
                            console.error("Database connection error:", error);
                            loading.innerHTML = "<p class='text-red-500 text-sm'>Failed to load schedule.</p>";
                        });
                    }
                });

            } catch (error) {
                console.error("Auth Error:", error);
            }
        }

        initLiveSchedule();
    </script>
</body>
</html>
